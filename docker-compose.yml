version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=12345
    command: redis-server --requirepass 12345
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - MONGODB_URI=mongodb+srv://koushikkorada27_db_user:LN1TosHiFIJ2FHUK@auth-cluster.17aoc2n.mongodb.net/authdb?retryWrites=true&w=majority&appName=auth-cluster
      - JWT_SECRET=your_jwt_secret_key_change_this_in_production
      - JWT_REFRESH_SECRET=your_jwt_refresh_secret_key_change_this_in_production
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - LOG_LEVEL=info
      - SERVICE_NAME=auth-service
    restart: unless-stopped

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=development
      - MONGODB_URI=mongodb+srv://koushikkorada27_db_user:LN1TosHiFIJ2FHUK@auth-cluster.17aoc2n.mongodb.net/productdb?retryWrites=true&w=majority&appName=auth-cluster
      - LOG_LEVEL=info
      - SERVICE_NAME=product-service
      - CLOUDINARY_NAME=dlgq0kduk
      - CLOUDINARY_API_KEY=533965194432471
      - CLOUDINARY_API_SECRET=EWSZg598ho85OJ1IMwxBxFbVu9w
      - CLOUDINARY_FOLDER=ecommerce_products
    restart: unless-stopped

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345
      - LOG_LEVEL=info
      - SERVICE_NAME=cart-service
    depends_on:
      - redis
    restart: unless-stopped

  # API Gateway - Centralized entry point with JWT authentication
  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - JWT_SECRET=your_jwt_secret_key_change_this_in_production
      - JWT_REFRESH_SECRET=your_jwt_refresh_secret_key_change_this_in_production
      - LOG_LEVEL=info
      - SERVICE_NAME=gateway-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=12345
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3003
      - CART_SERVICE_URL=http://cart-service:3002
      - ORDER_SERVICE_URL=http://order-service:3004
      - SEARCH_SERVICE_URL=http://search-service:3005
      - INVENTORY_SERVICE_URL=http://inventory-service:3006
      - PAYMENT_SERVICE_URL=http://payment-service:3007
      - NOTIFICATION_SERVICE_URL=http://notification-service:3008
      - USER_SERVICE_URL=http://user-service:3009
    depends_on:
      - redis
      - auth-service
      - product-service
      - cart-service
      - order-service
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: orderdb
    ports:
      - "3306:3306"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      LOG4J_ROOT_LOGLEVEL: WARN
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      LOG4J_ROOT_LOGLEVEL: WARN
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=orderdb
      - LOG_LEVEL=info
      - SERVICE_NAME=order-service
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=order-service
      - KAFKA_TOPIC=order-created
    depends_on:
      - mysql
      - kafka
    restart: unless-stopped

